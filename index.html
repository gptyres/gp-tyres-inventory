    <meta property="og:title" content="GP Tyres & Mags | Inventory Portal" />

    <link rel="apple-touch-icon" href="/gp-tyres-favicon.png?v=20260624" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode Defaults */
        --color-gp-black: #f3f4f6; /* Gray 100 */
        --color-gp-dark: #ffffff; /* White */
        --color-gp-panel: #ffffff; /* White */
        --color-gp-border: #e5e7eb; /* Gray 200 */
        --color-gp-text-main: #111827; /* Gray 900 */
        --color-gp-text-muted: #6b7280; /* Gray 500 */
        --color-gp-input: #f9fafb; /* Gray 50 */
        --color-gp-overlay: rgba(255, 255, 255, 0.5);
      }
      
      .dark {
        /* Dark Mode Overrides */
        --color-gp-black: #050505;
        --color-gp-dark: #121212;
        --color-gp-panel: #1E1E1E;
        --color-gp-border: #1f2937; /* Gray 800 */
        --color-gp-text-main: #f3f4f6; /* Gray 100 */
        --color-gp-text-muted: #9ca3af; /* Gray 400 */
        --color-gp-input: #000000;
        --color-gp-overlay: rgba(0, 0, 0, 0.4);
      }

      body {
        background-color: var(--color-gp-black);
        color: var(--color-gp-text-main);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s, color 0.3s;
      }

      a, button, input, select, textarea {
        transition-property: color, background-color, border-color, box-shadow, opacity, transform;
        transition-duration: 220ms;
        transition-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
        outline: 3px solid #ffd400;
        outline-offset: 3px;
      }

      /* Custom Scrollbar for Industrial Look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-gp-dark); 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FF0000; 
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gp: {
                black: 'var(--color-gp-black)',
                dark: 'var(--color-gp-dark)',
                panel: 'var(--color-gp-panel)',
                border: 'var(--color-gp-border)',
                text: {
                    main: 'var(--color-gp-text-main)',
                    muted: 'var(--color-gp-text-muted)',
                },
                input: 'var(--color-gp-input)',
                overlay: 'var(--color-gp-overlay)',
                silver: '#A0A0A0',
                red: '#FF0000',
                redHover: '#CC0000',
              }
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['Oswald', 'sans-serif'],
            }
          }
        }
      }
    </script>
